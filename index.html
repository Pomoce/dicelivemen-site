<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DiceLiveMen</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15171d;
      --muted: #5f6675;
      --line: #dde1e8;
      --accent: #ff2f5f;
      --bg: #f7f8fb;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 36px;
      box-shadow: 0 16px 40px rgba(21, 23, 29, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .mark {
      display: grid;
      width: 52px;
      height: 52px;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 700;
      background: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

      margin: 0 0 16px;
      color: var(--muted);
      font-size: 17px;
    }
